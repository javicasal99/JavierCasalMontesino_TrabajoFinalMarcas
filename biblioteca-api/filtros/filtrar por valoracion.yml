info:
  name: filtrar por valoracion
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/libros/buscar?ordenar_por=valoracion&orden=desc
  params:
    - name: ordenar_por
      value: valoracion
      type: query
    - name: orden
      value: desc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
