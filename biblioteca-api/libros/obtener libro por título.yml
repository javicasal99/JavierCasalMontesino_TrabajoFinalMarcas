info:
  name: obtener libro por título
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3000/buscar-libro?titulo=1984
  params:
    - name: titulo
      value: "1984"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
